<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text_nav" href="index.html">IFPARK</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Serviços</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="container-fluid d-flex h-75 align-items-center">
            <div class="row">
                <div class="col-3"></div>
                <div class="col-3">
                    <img class="img-fluid" src="images/IfParkBranco.png" alt="Logo IFPark">
                </div>
                <div class="col-3 align-items-center">
                    <div class="container-fluid bg-light rounded h-100">
                        <div class="row align-items-start text-dark">
                            <h1 class="text-center mt-2 title">Login</h1>
                        </div>
                        <div class="row mt-5 align-items-center">
                            <div class="mb-3">
                                <label for="email" class="form-label">Usuário</label>
                                <input type="text" class="form-control" name="email" id="email">
                            </div>
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" name="senha" id="senha">
                            </div>
                        </div>
                        <div class="row d-flex allign-items-end">
                            <div class="col"></div>
                            <div class="col text-center">
                                <button class="btn btn-success border" onclick="enviar()">Login</button>
                            </div>
                            <div class="col"></div>
                            
                        </div>
                    </div>
                </div>
                <div class="col"></div>
            </div>
        </div>
    </div>

    <script src="javascript/login.js"></script>
</body>

</html>
